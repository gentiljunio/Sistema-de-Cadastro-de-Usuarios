<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>Cadastro de Usuários</title>
</head>

<header>
  <button id="theme-toggle">Alternar Tema</button>
</header>

<body>
  <div class="container">
    <form id="userForm">
      <input type="hidden" id="editIndex"> <input type="text" id="cpf" placeholder="CPF" required />
      <input type="text" id="nome" placeholder="Nome Completo" required />
      <input type="date" id="dataNasc" required />
      <input type="email" id="email" placeholder="E-mail" required />
      <button type="submit" id="btnSalvar">Salvar Usuário</button>
    </form>

    <hr>

    <div class="search-container">
      <h2>Cadastro de Usuários</h2>

      <input type="text" id="search" placeholder="Pesquisar por nome..." onkeyup="ListarUsuarios()">
    </div>

    <table>
      <thead>
        <tr>
          <th>CPF</th>
          <th>Nome</th>
          <th>Nascimento</th>
          <th>E-mail</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="userTableBody">
      </tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>

</html>
